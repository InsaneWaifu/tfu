<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFU Template Tool</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=Fira+Code:wght@400;500&family=Instrument+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f1115;
            --panel: #151922;
            --panel-2: #1b2130;
            --text: #e6e6e6;
            --muted: #9aa4b2;
            --border: #2a3242;
            --accent: #6aa6ff;
            --danger: #ff5c5c;
            --radius: 10px;
            --font: "Instrument Sans", system-ui, -apple-system, Segoe UI, sans-serif;
            --mono: "Fira Code", monospace;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.5;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #app-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        #template-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select,
        input,
        textarea,
        button {
            font: inherit;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--text);
            padding: 8px 10px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        input {
            font-family: var(--font);
            font-size: 14px;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        #app-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 16px;
            flex: 1;
        }

        #form-container,
        #output-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            overflow: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            letter-spacing: 0.3px;
            color: var(--muted);
        }

        .field-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
            font-family: var(--mono);
            font-size: 13px;
        }

        button {
            cursor: pointer;
            transition: 0.15s ease;
            background: var(--accent);
            border: none;
            color: #0b0f16;
            font-weight: 600;
        }

        button:hover {
            opacity: 0.9;
        }

        #buttons-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        #rendered-output {
            font-size: 14px;
        }

        #rendered-output pre,
        #rendered-output code {
            font-family: var(--mono);
            background: #0b0f16;
            padding: 2px 4px;
            border-radius: 6px;
        }

        #rendered-output blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 10px;
            color: var(--muted);
            margin: 10px 0;
        }

        @media (max-width: 900px) {
            #app-body {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>

    <div id="react-body"></div>


    <script type="text/babel">
        function SenderField({ node, formData, onChange }) {
            const name = node.values[0];
            const label = node.properties.label || name;
            const selectedHandle = formData[name] || "";
            const person = selectedHandle ? people[selectedHandle] : null;

            function handleChange(e) {
                const handle = e.target.value
                onChange(name, handle)

                if (handle && people[handle]) {
                    onChange("sender_rank", people[handle].rank)
                    onChange("sender_name", people[handle].rp)
                    onChange("sender_role", people[handle].role)
                } else {
                    onChange("sender_rank", "")
                    onChange("sender_name", "")
                    onChange("sender_role", "")
                }
            }

            return (
                <div className="field-container">
                    <label>{label}</label>
                    <select name={name} value={selectedHandle} onChange={handleChange}>
                        <option value="">-- Select a person --</option>
                        {Object.values(people).map(p => (
                            <option key={p.name} value={p.name}>{p.name}</option>
                        ))}
                    </select>
                </div>
            )
        }
    
        function Field({ node, formData, onChange }) {
            const name = node.values[0];

            if (node.properties.sender === "yes") {
                return <SenderField node={node} formData={formData} onChange={onChange}/>;
            }

            if (node.children.length > 0) {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <select
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        >
                            <option value="">-- Select an option --</option>
                            {node.children.map(v => (
                                <option key={v.name} value={v.name}>{v.name}</option>
                            ))}
                        </select>
                    </div>
                );
            }

            if (node.properties.multiline === "yes") {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <textarea id="input-text"
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        />
                    </div>
                );
            } else {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <input
                            type="text"
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        />
                    </div>
                );
            }
        }


        function RenderNode({ node, formData, onChange }) {
            if (node.name === "field") {
                return <Field node={node} formData={formData} onChange={onChange} />;
            }

            if (node.name === "showIf") {
                const shouldShow = Object.entries(node.properties || {}).every(
                    ([k, v]) => formData[k] === v
                );

                if (!shouldShow) return null;

                return node.children.map((child, i) => (
                    <RenderNode
                        key={i}
                        node={child}
                        formData={formData}
                        onChange={onChange}
                    />
                ));
            }

            return null;
        }



        function App() {
            const [formData, setFormData] = React.useState({});
            const [selectedTemplate, setSelectedTemplate] = React.useState(Object.keys(window.templates)[0]);
            const schema = React.useMemo(() => window.templates[selectedTemplate].schema, [selectedTemplate]);
            const formIsFilled = React.useMemo(() => {
                const requiredFields = [];
                function findRequiredFields(node) {
                    if (node.name === "field") {
                        requiredFields.push(node.values[0]);
                    } else if (node.name === "showIf") {
                        const shouldShow = Object.entries(node.properties || {}).every(
                            ([k, v]) => formData[k] === v
                        );
                        if (shouldShow)
                            node.children.forEach(findRequiredFields);
                    }
                }
                schema.output.forEach(findRequiredFields);
                return requiredFields.every(field => formData[field]);
            }, [schema, formData]);



            const renderedOutput = React.useMemo(() => {
                const template = Handlebars.compile(window.templates[selectedTemplate].content);
                const rendered = template(formData, { noEscape: true });
                const out = marked.parse(rendered);
                console.log(out);
                return {
                    html: '<meta http-equiv="content-type" content="text/html; charset=utf-8">' + out,
                    md: rendered
                }
            }, [formData, selectedTemplate, formIsFilled]);


            function onChange(name, value) {
                setFormData(prev => ({ ...prev, [name]: value }));
            }

            async function copyRichText() {
                if (!navigator.clipboard) {
                    alert("Clipboard API not supported");
                    return;
                }

                try {
                    await navigator.clipboard.write([
                        new ClipboardItem({
                            "text/html": new Blob([renderedOutput.html], { type: "text/html" }),
                            "text/plain": new Blob([renderedOutput.md], { type: "text/plain" })
                        })
                    ]);
                    alert("Rendered output copied to clipboard!");
                } catch (err) {
                    console.error("Failed to copy: ", err);
                    alert("Failed to copy rendered output.");
                }
            }

            return (
                // schema selector, then form, then rendered output
                <div id="app-container">
                    <div id="app-header">
                        <div id="template-selector">
                            <label htmlFor="template-select">Select template:</label>
                            <select
                                id="template-select"
                                value={selectedTemplate}
                                onChange={e => setSelectedTemplate(e.target.value)}
                            >
                                {Object.keys(window.templates).map(templateName => (
                                    <option key={templateName} value={templateName}>
                                        {templateName}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>
                    <div id="app-body">
                        <div id="form-container">
                            <h2>Form</h2>
                            {!formIsFilled && <p style={{ color: "red" }}>Form is not entirely filled.</p>}

                            {schema.output.map((node, i) => (
                                <RenderNode
                                    key={i}
                                    node={node}
                                    formData={formData}
                                    onChange={onChange}
                                />
                            ))}
                        </div>

                        <div id="output-container">
                            <div id="buttons-container">
                                <button onClick={copyRichText}>
                                    Copy Rendered Output
                                </button>
                            </div>
                            <div id="rendered-output">
                                <div dangerouslySetInnerHTML={{ __html: renderedOutput.html }} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function WaitForData(cb) {
            if (window.template && window.people) {
                return cb;
            }

            window.addEventListener("data-ready", cb, { once: true });
        }

        WaitForData(() => {
            ReactDOM.createRoot(document.getElementById("react-body")).render(<App />);
        });
    </script>

    <script type="module">
        import { parse } from "https://esm.sh/kdljs@0.3.0";

        const template_names = {
            removal: "Removal from X",
            punishment: "Notice of Punishment",
            investigation: "Notice of Investigation",
            activity: "Activity Warning",
            "lets-talk": "Let's Talk",
            warning: "First/Final Written Warning",
            blacklist: "Notice of Blacklist",
        }

        // Discover all templates
        let templates = {};
        for (const [name, title] of Object.entries(template_names)) {
            const schema_res = await fetch("templates/" + name + "/schema");
            const content_res = await fetch("templates/" + name + "/content");

            const schema = await schema_res.text();
            const content = await content_res.text();

            templates[title] = {
                content: content,
                schema: parse(schema)
            }
        }
        
        /*
        document.querySelectorAll("script.template").forEach(templateScript => {
            const templateName = templateScript.getAttribute("title");
            const templateContent = templateScript.innerHTML;
            const templateSchemaScript = document.getElementById(templateScript.getAttribute("id") + "-schema");
            const templateSchema = parse(templateSchemaScript.innerHTML);
            console.log(templateSchema);
            templates[templateName] = {
                content: templateContent,
                schema: templateSchema
            };
        });
        */
        window.templates = templates;

        const res = await fetch("https://api.a1larsen.de/api/v2/tfu/hierarchy");
        const data = await res.json();

        window.people = Object.fromEntries(data.map(p => {
            return [p.nick, { name: p.nick, rp: p.rpName, rank: p.displayName, role: p.role }];
        }));

        Handlebars.registerHelper("eq", function (arg1, arg2) {
            return arg1 === arg2;
        });

        Handlebars.registerHelper("neq", function (arg1, arg2) {
            return arg1 !== arg2;
        });

        Handlebars.registerHelper("and", function (...args) {
            return args.slice(0, -1).every(Boolean);
        });

        Handlebars.registerHelper("nand", function (...args) {
            return !args.slice(0, -1).every(Boolean);
        });

        Handlebars.registerHelper("or", function (...args) {
            return args.slice(0, -1).some(Boolean);
        });

        Handlebars.registerHelper("concat", function () {
            return Array.from(arguments).slice(0, -1).join("");
        });

        Handlebars.registerPartial("header", `
<p style="text-align: center;">
    <img src="https://plpd.online/images/swat.png" style="display: block; margin: 0 auto;" width="164" height="164"/><br/>
    <b>{{title}}</b><br/>
    <b>{{department}}</b>
</p>
        `)

        window.dispatchEvent(new CustomEvent("data-ready"));
    </script>

</body>

</html>
